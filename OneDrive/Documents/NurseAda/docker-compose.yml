services:
  gateway:
    build:
      context: ./services/gateway
    env_file:
      - ./.env
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    depends_on:
      - llm-gateway
      - cdss
      - knowledge

  llm-gateway:
    build:
      context: ./services/llm-gateway
    env_file:
      - ./.env
    ports:
      - "8001:8001"

  cdss:
    build:
      context: ./services/cdss
    env_file:
      - ./.env
    ports:
      - "8002:8002"

  knowledge:
    build:
      context: ./services/knowledge
    env_file:
      - ./.env
    ports:
      - "8003:8003"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: nurseada
      POSTGRES_PASSWORD: nurseada
      POSTGRES_DB: nurseada
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:

