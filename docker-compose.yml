# NurseAda – local dev. Run: docker-compose up --build
# Web app: npm run dev in apps/web (uses NEXT_PUBLIC_GATEWAY_URL=http://localhost:8000)

services:
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GATEWAY_FHIR_URL=http://fhir-adapter:8011
      - GATEWAY_LLM_URL=http://llm-gateway:8001
      - GATEWAY_CDSS_URL=http://cdss:8002
      - GATEWAY_KNOWLEDGE_URL=http://knowledge:8003
      - PHARMACY_API_URL=
      - LAB_API_URL=
      - EMERGENCY_API_URL=
      - GATEWAY_XAI_URL=http://xai:8012

  fhir-adapter:
    build:
      context: ./services/fhir-adapter
      dockerfile: Dockerfile
    ports:
      - "8011:8011"
    environment:
      - FHIR_BASE_URL=

  llm-gateway:
    build:
      context: ./services/llm-gateway
      dockerfile: Dockerfile
    ports:
      - "8001:8001"

  cdss:
    build:
      context: ./services/cdss
      dockerfile: Dockerfile
    ports:
      - "8002:8002"

  knowledge:
    build:
      context: ./services/knowledge
      dockerfile: Dockerfile
    ports:
      - "8003:8003"

  xai:
    build:
      context: ./services/xai
      dockerfile: Dockerfile
    ports:
      - "8012:8012"

  ussd:
    build:
      context: ./services/ussd
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    environment:
      - GATEWAY_URL=http://gateway:8000
