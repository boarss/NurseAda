apiVersion: v1
kind: Service
metadata:
  name: nurseada-fhir-adapter
  labels:
    app: nurseada-fhir-adapter
spec:
  type: {{ .Values.fhirAdapter.service.type }}
  selector:
    app: nurseada-fhir-adapter
  ports:
    - port: {{ .Values.fhirAdapter.service.port }}
      targetPort: 8011
      protocol: TCP
      name: http

