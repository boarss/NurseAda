apiVersion: apps/v1
kind: Deployment
metadata:
  name: nurseada-gateway
  labels:
    app: nurseada-gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: nurseada-gateway
  template:
    metadata:
      labels:
        app: nurseada-gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.registry }}{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: GATEWAY_CDSS_URL
              value: {{ .Values.env.gateway.GATEWAY_CDSS_URL | quote }}
            - name: GATEWAY_KNOWLEDGE_URL
              value: {{ .Values.env.gateway.GATEWAY_KNOWLEDGE_URL | quote }}
            - name: GATEWAY_XAI_URL
              value: {{ .Values.env.gateway.GATEWAY_XAI_URL | quote }}
            - name: GATEWAY_LLM_URL
              value: {{ .Values.env.gateway.GATEWAY_LLM_URL | quote }}
            - name: GATEWAY_FHIR_URL
              value: {{ .Values.env.gateway.GATEWAY_FHIR_URL | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources: {{- toYaml .Values.gateway.resources | nindent 12 }}

